version: "3.9"

services:
  # MQTT Broker for vehicle telemetry simulation
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: aegis-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped

  # Redis for sessions and caching (via Docker, free alternative to Upstash for local dev)
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # FastAPI ML backend
  backend:
    build: ./backend
    container_name: aegis-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mosquitto
    volumes:
      - ./backend:/app
    restart: unless-stopped

networks:
  default:
    name: aegis-network
